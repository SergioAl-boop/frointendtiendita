<div class="min-h-screen bg-gray-100 p-10">
  <!-- Header -->
  <div class="flex justify-between items-center mb-8">
    <div>
      <h2 class="text-4xl font-bold text-gray-800">Inventario 📦</h2>
      <p class="text-gray-500 mt-2">Gestión de productos y stock</p>
    </div>
    <!-- Botón para registrar producto
    <a
      routerLink="/addproduct"
      class="bg-gradient-to-r from-green-500 to-emerald-600 text-white px-5 py-2 rounded-xl shadow-md hover:scale-105 transition">
      + Registrar producto
    </a>
    -->
  </div>

  <!-- Formulario de registro -->
  <div class="bg-white rounded-3xl shadow-lg p-8 mb-10">
    <h3 class="text-2xl font-bold text-gray-800 mb-6">Registrar nuevo producto</h3>
    <form (ngSubmit)="addProduct()" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre</label>
        <input type="text" [(ngModel)]="newProduct.name" name="name"
          class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
          placeholder="Ej. Laptop Dell" required>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Categoría</label>
        <select [(ngModel)]="newProduct.category" name="category"
          class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          <option value="" disabled selected>Selecciona una categoría</option>
          <option value="Electrónica">Electrónica</option>
          <option value="Muebles">Muebles</option>
          <option value="Ropa">Ropa</option>
          <option value="Otros">Otros</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Precio</label>
        <input type="number" [(ngModel)]="newProduct.price" name="price"
          class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
          placeholder="Ej. 15000" required>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Stock</label>
        <input type="text" [(ngModel)]="newProduct.stock" name="stock"
          class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
          placeholder="Disponible / Agotado" required>
      </div>
      <div class="md:col-span-2 flex justify-end mt-6">
        <button type="submit"
          class="bg-gradient-to-r from-indigo-600 to-blue-500 text-white px-6 py-2 rounded-xl shadow-md hover:scale-105 transition">
          Guardar producto
        </button>
      </div>
    </form>
  </div>

  <!-- Tabla de inventario -->
  <div class="bg-white rounded-3xl shadow-lg p-8">
    <h3 class="text-2xl font-bold text-gray-800 mb-6">Inventario actual</h3>
    <div class="overflow-x-auto">
      <table class="min-w-full border border-gray-200 rounded-xl shadow-sm">
        <thead class="bg-indigo-600 text-white">
          <tr>
            <th class="px-6 py-3 text-left text-sm font-semibold">Producto</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Categoría</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Precio</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Stock</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Acciones</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
  @for (product of products; track $index) {
    <tr class="hover:bg-gray-50 transition">
      <td class="px-6 py-4 text-sm text-gray-800">{{ product.name }}</td>
      <td class="px-6 py-4 text-sm text-gray-600">{{ product.category }}</td>
      <td class="px-6 py-4 text-sm text-green-600 font-bold">${{ product.price }}</td>
      <td class="px-6 py-4 text-sm">
        <span [ngClass]="product.stock === 'Disponible' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'"
          class="px-3 py-1 rounded-full text-xs">
          {{ product.stock }}
        </span>
      </td>
      <td class="px-6 py-4 text-sm flex gap-2">
        <button class="bg-blue-500 text-white px-3 py-1 rounded-lg hover:bg-blue-600 shadow-sm transition">Editar</button>
        <button class="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 shadow-sm transition"
          (click)="deleteProduct($index)">Eliminar</button>
      </td>
    </tr>
  }
</tbody>

      </table>
    </div>
  </div>
</div>
