<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white w-full max-w-lg rounded-xl shadow-lg p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
      Agregar nuevo producto
    </h2>

    <form (ngSubmit)="addProduct()" class="space-y-5">
      <!-- Nombre -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
        <input type="text" [(ngModel)]="newProduct.name" name="name"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none"
          placeholder="Ej. Laptop Dell" required>
      </div>

      <!-- Categoría -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
        <select [(ngModel)]="newProduct.category" name="category"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none">
          <option value="" disabled selected>Selecciona una categoría</option>
          <option value="Electrónica">Electrónica</option>
          <option value="Muebles">Muebles</option>
          <option value="Ropa">Ropa</option>
          <option value="Otros">Otros</option>
        </select>
      </div>

      <!-- Precio -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Precio</label>
        <input type="number" [(ngModel)]="newProduct.price" name="price"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none"
          placeholder="Ej. 15000" required>
      </div>

      <!-- Stock -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Stock</label>
        <input type="text" [(ngModel)]="newProduct.stock" name="stock"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 focus:outline-none"
          placeholder="Disponible / Agotado" required>
      </div>

      <!-- Botones -->
      <div class="flex justify-between mt-6">
        <button type="button" (click)="closeModal()"
          class="bg-gray-300 text-gray-700 px-5 py-2 rounded-lg hover:bg-gray-400 transition">
          Cancelar
        </button>
        <button type="submit"
          class="bg-green-500 text-white px-5 py-2 rounded-lg hover:bg-green-600 shadow-md transition">
          Guardar producto
        </button>
      </div>
    </form>
  </div>
</div>
