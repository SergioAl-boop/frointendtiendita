<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl p-10">

    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
      <div class="w-14 h-14 bg-indigo-600 text-white rounded-2xl flex items-center justify-center text-3xl shadow-lg">
        📦
      </div>
      <div>
        <h2 class="text-3xl font-bold text-gray-800">Agregar producto</h2>
        <p class="text-gray-500">Completa la información para registrar un nuevo producto</p>
      </div>
    </div>

    <!-- Form -->
    <form (ngSubmit)="addProduct()" class="space-y-6">
      <!-- Nombre -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre</label>
        <div class="relative">
          <span class="absolute left-3 top-2.5 text-gray-400">📝</span>
          <input type="text" [(ngModel)]="newProduct.name" name="name"
            class="w-full pl-10 border border-gray-300 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
            placeholder="Ej. Laptop Dell" required>
        </div>
      </div>

      <!-- Categoría -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Categoría</label>
        <div class="relative">
          <span class="absolute left-3 top-2.5 text-gray-400">📂</span>
          <select [(ngModel)]="newProduct.category" name="category"
            class="w-full pl-10 border border-gray-300 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            <option value="" disabled selected>Selecciona una categoría</option>
            <option value="Electrónica">Electrónica</option>
            <option value="Muebles">Muebles</option>
            <option value="Ropa">Ropa</option>
            <option value="Otros">Otros</option>
          </select>
        </div>
      </div>

      <!-- Precio -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Precio</label>
        <div class="relative">
          <span class="absolute left-3 top-2.5 text-gray-400">💰</span>
          <input type="number" [(ngModel)]="newProduct.price" name="price"
            class="w-full pl-10 border border-gray-300 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
            placeholder="Ej. 15000" required>
        </div>
      </div>

      <!-- Stock -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Stock</label>
        <div class="relative">
          <span class="absolute left-3 top-2.5 text-gray-400">📦</span>
          <input type="text" [(ngModel)]="newProduct.stock" name="stock"
            class="w-full pl-10 border border-gray-300 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
            placeholder="Disponible / Agotado" required>
        </div>
      </div>

      <!-- Botones -->
      <div class="flex justify-end gap-4 mt-8">
        <button type="button" (click)="closeModal()"
          class="bg-gray-200 text-gray-700 px-6 py-2 rounded-xl hover:bg-gray-300 transition">
          Cancelar
        </button>
        <button type="submit"
          class="bg-gradient-to-r from-indigo-600 to-blue-500 text-white px-6 py-2 rounded-xl shadow-md hover:scale-105 transition">
          Guardar producto
        </button>
      </div>
    </form>
  </div>
</div>
